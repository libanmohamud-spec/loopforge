name: loops

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  verify-loops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Enforce catalog and loop contract
        run: python3 ci/check.py
